# Nginx 反代示例（上线时把操作台与 monitor 放同域）
# 假设：操作台 https://fpp.example.com ；monitor 本机 127.0.0.1:18888

# 政策监控 API + 临时资讯墙（新操作台做好后可只保留 /api/ ）
location /policy/ {
    proxy_pass http://127.0.0.1:18888/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 仅 API（给未来操作台 fetch 用）
location /api/policy-feed {
    proxy_pass http://127.0.0.1:18888/api/policy-feed;
    proxy_set_header Host $host;
}

location /api/bot/ {
    proxy_pass http://127.0.0.1:18888/api/bot/;
    proxy_set_header Host $host;
}
